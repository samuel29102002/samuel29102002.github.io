  <section style="padding-top: calc(var(--s-9) + 4rem);">
    <div class="contact-wrap">
      <span class="eyebrow">Reach</span>
      <h1 style="font-size: var(--fs-2xl); margin-bottom: var(--s-7);">Contact.</h1>

      <ul class="contact-rows">

        <li>
          <a class="contact-row" href="mailto:samuelheinrich2002@gmail.com">
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="14" rx="2"/>
                <path d="M3 7l9 6 9-6"/>
              </svg>
            </span>
            <span class="contact-label">Email</span>
            <span class="contact-handle">samuelheinrich2002@gmail.com</span>
            <span class="contact-arrow">→</span>
          </a>
        </li>

        <li>
          <a class="contact-row" href="https://github.com/samuel29102002" target="_blank" rel="noopener">
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.12-1.47-1.12-1.47-.92-.62.07-.61.07-.61 1.01.07 1.55 1.04 1.55 1.04.9 1.55 2.36 1.1 2.94.84.09-.66.35-1.1.64-1.36-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.99 1.03-2.69-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02a9.5 9.5 0 0 1 5 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.6 1.03 2.69 0 3.85-2.34 4.69-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10 10 0 0 0 12 2z"/>
              </svg>
            </span>
            <span class="contact-label">GitHub</span>
            <span class="contact-handle">@samuel29102002</span>
            <span class="contact-arrow">→</span>
          </a>
        </li>

        <li>
          <a class="contact-row" href="https://linkedin.com/in/samuel-heinrich-5b7145226/" target="_blank" rel="noopener">
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.22 8h4.56v14H.22V8zm7.4 0h4.37v1.92h.06c.61-1.15 2.1-2.36 4.32-2.36 4.62 0 5.47 3.04 5.47 7v7.44h-4.56v-6.6c0-1.57-.03-3.6-2.19-3.6-2.2 0-2.54 1.71-2.54 3.48V22H7.62V8z"/>
              </svg>
            </span>
            <span class="contact-label">LinkedIn</span>
            <span class="contact-handle">samuel-heinrich</span>
            <span class="contact-arrow">→</span>
          </a>
        </li>

        <li>
          <a class="contact-row" href="https://www.instagram.com/_samaezy_" target="_blank" rel="noopener">
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="5"/>
                <circle cx="12" cy="12" r="4"/>
                <circle cx="17.5" cy="6.5" r="0.6" fill="currentColor"/>
              </svg>
            </span>
            <span class="contact-label">Instagram</span>
            <span class="contact-handle">@_samaezy_</span>
            <span class="contact-arrow">→</span>
          </a>
        </li>

      </ul>

      <!-- Optional fallback form -->
      <form class="contact-form" id="mailto-form" novalidate>
        <div class="form-divider">Or send a quick note</div>

        <div class="field">
          <label for="f-name">Name</label>
          <input id="f-name" name="name" type="text" autocomplete="name" />
        </div>

        <div class="field">
          <label for="f-subject">Subject</label>
          <input id="f-subject" name="subject" type="text" />
        </div>

        <div class="field">
          <label for="f-body">Message</label>
          <textarea id="f-body" name="body"></textarea>
        </div>

        <button type="submit">Send</button>
      </form>
    </div>

  <footer class="footer">
    <div class="footer-inner">
      <span>© 2026 · Samuel Heinrich</span>
      <span>samuelheinrich2002@gmail.com</span>
      <span>HTML · CSS · JS</span>
    </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js" defer></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js" defer></script>
  <script src="js/scroll.js" defer></script>
  <script src="js/nav.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      const f = document.getElementById('mailto-form');
      if (!f) return;
      f.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('f-name').value || '';
        const subj = encodeURIComponent(document.getElementById('f-subject').value || 'Hello');
        const bodyRaw = (document.getElementById('f-body').value || '') + (name ? `\n\n— ${name}` : '');
        const body = encodeURIComponent(bodyRaw);
        window.location.href = `mailto:samuelheinrich2002@gmail.com?subject=${subj}&body=${body}`;
      });
    });
  </script>
</body>
